{% extends "base.html" %}

{% block title %}登录 - 报价工作台{% endblock %}

{% block content %}
<section class="panel" style="max-width: 460px; margin: 48px auto;">
    <div class="panel-head">
        <h1 style="font-size: 26px; margin: 0;">登录</h1>
    </div>
    <div class="panel-body">
        <form method="POST" class="stack">
            <input type="hidden" name="next" value="{{ next }}">
            <label>账号<input type="text" name="username" autocomplete="username" required autofocus></label>
            <label>密码<input type="password" name="password" autocomplete="current-password" required></label>
            <button class="button" type="submit">进入系统</button>
        </form>
        <p class="muted" style="margin-top: 16px; margin-bottom: 0;">默认账号：sales / 1234。</p>
    </div>
</section>
{% endblock %}
