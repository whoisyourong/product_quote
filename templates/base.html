<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}报价工作台{% endblock %}</title>
    <style>
        :root {
            --bg: #f6f3ee;
            --surface: rgba(255, 255, 255, 0.86);
            --surface-strong: #ffffff;
            --ink: #18202f;
            --muted: #697386;
            --line: #e3ddd4;
            --accent: #0f766e;
            --accent-2: #d97706;
            --danger: #b42318;
            --shadow: 0 18px 48px rgba(37, 45, 58, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 8%, rgba(15, 118, 110, 0.16), transparent 28%),
                linear-gradient(140deg, #f7faf9 0%, var(--bg) 52%, #eef3f1 100%);
            color: var(--ink);
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            line-height: 1.5;
        }

        a { color: inherit; text-decoration: none; }

        .app {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 22px 0 40px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
            padding: 10px 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: #10231f;
            color: #f8fafc;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 999px;
            background: rgba(255,255,255,0.62);
            padding: 5px;
            backdrop-filter: blur(12px);
        }

        .nav a {
            border-radius: 999px;
            color: var(--muted);
            font-weight: 700;
            padding: 9px 14px;
        }

        .nav a.active,
        .nav a:hover {
            background: #10231f;
            color: #ffffff;
        }

        .hero,
        .panel,
        .metric,
        .quote-card {
            border: 1px solid rgba(255,255,255,0.72);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 24px;
            margin-bottom: 22px;
            padding: 28px;
        }

        h1, h2, h3, p { margin-top: 0; }

        h1 {
            margin-bottom: 10px;
            font-size: 34px;
            letter-spacing: 0;
        }

        h2 { font-size: 20px; }
        h3 { font-size: 16px; }

        .muted { color: var(--muted); }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 16px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .metric {
            padding: 18px;
        }

        .metric span {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .metric strong {
            display: block;
            margin-top: 8px;
            font-size: 30px;
        }

        .panel {
            margin-bottom: 18px;
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid var(--line);
            padding: 17px 20px;
        }

        .panel-body { padding: 20px; }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #ffffff;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            padding: 9px 16px;
        }

        .button.secondary {
            background: #10231f;
        }

        .button.ghost {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
        }

        .button.danger {
            background: var(--danger);
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
            color: var(--ink);
            font: inherit;
            padding: 11px 12px;
        }

        textarea { min-height: 88px; resize: vertical; }

        label {
            display: grid;
            gap: 7px;
            color: #334155;
            font-weight: 800;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .form-actions { margin-top: 16px; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid var(--line);
            padding: 13px 14px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: rgba(248,250,252,0.82);
            color: #475569;
            font-size: 13px;
        }

        .table-wrap { overflow-x: auto; }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            background: rgba(15,118,110,0.12);
            color: var(--accent);
            font-size: 13px;
            font-weight: 800;
            padding: 5px 10px;
        }

        .empty {
            color: var(--muted);
            padding: 28px;
            text-align: center;
        }

        .flash {
            margin-bottom: 14px;
            border-radius: 8px;
            padding: 12px 14px;
            font-weight: 800;
        }

        .flash.success {
            background: rgba(15,118,110,0.13);
            color: var(--accent);
        }

        .flash.error {
            background: rgba(180,35,24,0.11);
            color: var(--danger);
        }

        .quote-card {
            padding: 18px;
        }

        .stack {
            display: grid;
            gap: 12px;
        }

        @media (max-width: 860px) {
            .topbar,
            .toolbar,
            .panel-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .nav {
                width: 100%;
                overflow-x: auto;
            }

            .hero,
            .grid-2,
            .grid-3,
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="topbar">
            <a class="brand" href="/">
                <span class="brand-mark">Q</span>
                <span>报价工作台</span>
            </a>
            <nav class="nav">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">总览</a>
                <a href="/products" class="{% if request.path.startswith('/products') %}active{% endif %}">产品</a>
                <a href="/materials" class="{% if request.path == '/materials' %}active{% endif %}">材料价格</a>
                <a href="/process-rates" class="{% if request.path == '/process-rates' %}active{% endif %}">工艺单价</a>
                <a href="/temporary-quote" class="{% if request.path == '/temporary-quote' %}active{% endif %}">临时报价</a>
                <a href="/quotes" class="{% if request.path.startswith('/quotes') %}active{% endif %}">报价档案</a>
            </nav>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
    <script>
        document.addEventListener("focusin", (event) => {
            if (event.target.matches("input")) {
                event.target.select();
            }
        });
    </script>
</body>
</html>
